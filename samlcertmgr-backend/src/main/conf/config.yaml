# DropWizard
server:
  rootPath: /api/*
  applicationConnectors:
    - type: http
      port: 8080
  adminConnectors:
    - type: http
      port: 8081

logging:
  level: DEBUG
  loggers:
    io.netty: INFO
    org.eclipse.jetty: INFO
    reactor.netty: INFO
  appenders:
    - type: console
      logFormat: "%d{yyyy-MM-dd HH:mm:ss} [%level][%X{ctx}][%logger{36}] - [%msg]%n"
      timeZone: America/New_York

# Application
cookieSecure: true

entra:
  tenantId: b101f7ab-56ac-485f-b397-5279698fdf7d
  clientId: fb777bd0-1548-4baa-8fac-6b2b6fe4c2e9
  redirectUri: http://localhost:8080/api/login/oauth2/code/azure
  groupClaimName: groups
  authGroupId: 9ded6e24-caa7-4776-aa65-f769608d024a
  
  #groupClaimName: roles          # was "groups"
  #authGroupId: ConsoleUser       # the app role's value, not an object id

localJwkDir: C:/Users/sanri001/Desktop/output
#keyVaultUri: "https://${KEY_VAULT_NAME}.vault.azure.net"
keyVaultUri:     ""


# Scope requested on the AIC service-account JWT-bearer grant. Defaults to fr:am:* if omitted.
aicScope: "fr:am:*"

aic:
  uat:
    label: UAT
    tenantFqdn: "https://${AIC_UAT_HOST}"
    realm: bravo
    serviceAccountId: "${AIC_UAT_SA_ID}"
    jwkName: aic-uat-jwk
  staging:
    label: Staging
    tenantFqdn: "https://${AIC_STAGING_HOST}"
    realm: bravo
    serviceAccountId: "${AIC_STAGING_SA_ID}"
    jwkName: aic-staging-jwk
  prod:
    label: Production
    tenantFqdn: https://openam-staplesciam-use4.id.forgerock.io
    realm: bravo
    serviceAccountId: 03ef5c0d-57df-4835-8e67-0a6a0365596b
    jwkName: samlMigration_privateKey